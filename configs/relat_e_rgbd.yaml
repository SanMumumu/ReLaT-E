experiment:
  name: relat_e_rgbd
  output: ./results_relat_e
  seed: 42
  resume: false
  n_gpus: 1

data:
  name: CITYSCAPES_RGBD
  data_folder: /mnt/nodestor/ws/UniWM/DATA/data
  resolution: 128
  video_len: 30
  cond_frames: 2
  pred_frames: 8
  batch_size: 1
  num_workers: 8
  depth_in_channels: 3
  depth_out_channels: 3
  max_size: null

rgb_vae:
  architecture: vit_3d_vae
  embed_dim: 4
  bn_momentum: 0.1
  channels: 192
  resolution: 128
  frames: 8
  in_channels: 3
  out_channels: 3
  splits: 1
  layers: 8
  kl_weight: 1.0e-6

depth_vae:
  architecture: vit_3d_vae
  embed_dim: 4
  bn_momentum: 0.1
  channels: 192
  resolution: 128
  frames: 8
  in_channels: 3
  out_channels: 3
  splits: 1
  layers: 8
  kl_weight: 1.0e-6

generator:
  scale: base
  mot:
    input_size: 32
    in_channels: 4
    hidden_size: 768
    depth: 12
    num_heads: 12
    aligned_depth: 4
    bn_momentum: 0.1
    use_qknorm: true
    use_swiglu: true
    use_rmsnorm: true
    wo_shift: true
    fused_attn: true
    use_rope: false
    same_noise: true

teachers:
  rgb:
    name: videomaev2_distill_base
    target_dim: 768
    checkpoint: ./ckpts/VideoMAEv2/distill/vit_b_k710_dl_from_giant.pth
    input_size: 224
    num_frames: 8
    normalize: imagenet
    target_resolution: [224, 224]
  depth:
    name: video_depth_anything
    repo_root: ./external/Video-Depth-Anything
    checkpoint: ./external/Video-Depth-Anything/checkpoints/video_depth_anything_vitb.pth
    encoder: vitb
    input_size: 518
    metric: false
    feature_source: path3
    target_dim: 128

loss:
  flow:
    weight: 1.0
    sigma_min: 1.0e-5
    sampling_timesteps: 50
  relation:
    weight: 1.0
    beta_spatial: 1.0
    beta_temporal: 1.0
  recon:
    rgb:
      mse_weight: 1.0
      l1_weight: 4.0
      perceptual_weight: 4.0
      kl_weight: 1.0
    depth:
      mse_weight: 1.0
      l1_weight: 4.0
      perceptual_weight: 0.0
      kl_weight: 1.0

partial_conditioning:
  probs:
    full: 0.5
    rgb_only: 0.25
    depth_only: 0.25

optim:
  lr_vae: 1.0e-4
  lr_generator: 1.0e-4
  betas: [0.9, 0.95]
  weight_decay: 0.0
  max_iter: 250000
  log_freq: 500
  eval_freq: 5000
  save_freq: 10000
  amp: true
  grad_clip: 1.0
  save_memory: false
  teacher_chunk_size: 0

ema:
  decay: 0.9999

eval:
  eval_samples: 16
  future_frames: 28
  sampling_timesteps: 50
  cfg_scale: 1.0
